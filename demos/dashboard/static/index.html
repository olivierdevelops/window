<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr 1fr;
      gap: 16px;
      height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .badge { font-size: 0.75rem; color: #888; background: #1a1a1a; padding: 4px 10px; border-radius: 6px; }
    .card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card h2 { font-size: 0.85rem; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    canvas { flex: 1; min-height: 0; }
  </style>
</head>
<body>
  <header>
    <h1>Live Dashboard</h1>
    <div class="badge">js_inject: chart.js</div>
  </header>
  <div class="card">
    <h2>CPU Load (%)</h2>
    <canvas id="cpuChart"></canvas>
  </div>
  <div class="card">
    <h2>Memory Usage (%)</h2>
    <canvas id="memChart"></canvas>
  </div>
  <div class="card" style="grid-column: 1 / -1;">
    <h2>Network I/O (KB/s)</h2>
    <canvas id="netChart"></canvas>
  </div>

  <script>
    function makeChart(id, label, color, max) {
      const labels = Array.from({length: 30}, (_, i) => '');
      const data = Array.from({length: 30}, () => Math.random() * max);
      return new Chart(document.getElementById(id), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label,
            data,
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0.4,
          }]
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { display: false },
            y: { min: 0, max, grid: { color: '#252525' }, ticks: { color: '#555' } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function waitForChartJS() {
      if (typeof Chart === 'undefined') {
        setTimeout(waitForChartJS, 50);
        return;
      }
      const cpu = makeChart('cpuChart', 'CPU', '#7c7cff', 100);
      const mem = makeChart('memChart', 'Memory', '#ff7c7c', 100);
      const net = makeChart('netChart', 'Network', '#7cffb2', 1000);

      function push(chart, value) {
        chart.data.datasets[0].data.push(value);
        chart.data.datasets[0].data.shift();
        chart.data.labels.push('');
        chart.data.labels.shift();
        chart.update('none');
      }

      setInterval(() => {
        push(cpu, 20 + Math.random() * 60 + Math.sin(Date.now() / 2000) * 20);
        push(mem, 40 + Math.random() * 30);
        push(net, Math.random() * 800 + Math.abs(Math.sin(Date.now() / 1000)) * 400);
      }, 500);
    }
    waitForChartJS();
  </script>
</body>
</html>
