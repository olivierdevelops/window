<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 20px;
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      min-width: 320px;
    }
    .label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; color: #555; text-transform: uppercase; }
    .value { font-size: 4rem; font-weight: 700; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
    .controls { display: flex; gap: 16px; }
    button {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid #303030;
      background: #1e1e1e;
      color: #e8e8e8;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a2a; }
    button:active { background: #333; transform: scale(0.95); }
    .timer {
      font-size: 0.8rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }
    .timer span { color: #888; }
    .status { font-size: 0.7rem; color: #444; }
    .status.connected { color: #3fb950; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Counter</div>
    <div class="value" id="count">0</div>
    <div class="controls">
      <button onclick="adjust(-1)">−</button>
      <button onclick="adjust(1)">+</button>
    </div>
    <div class="timer">Time: <span id="timer">—</span></div>
    <div class="status" id="status">connecting...</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
