<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #toolbar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    #platform-badge {
      background: #21262d;
      border-radius: 4px;
      padding: 2px 8px;
      color: #58a6ff;
    }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cmd-line { color: #58a6ff; }
    .cmd-line::before { content: '$ '; color: #3fb950; }
    .out-block { color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
    .err-block { color: #f85149; white-space: pre-wrap; word-break: break-all; }
    .info { color: #8b949e; font-style: italic; }
    #input-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: #161b22;
      border-top: 1px solid #21262d;
      gap: 8px;
    }
    #input-row span { color: #3fb950; }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #c9d1d9;
      font: inherit;
      outline: none;
      caret-color: #58a6ff;
    }
    #run-btn {
      background: #238636;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 5px 14px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #run-btn:hover { background: #2ea043; }
    #run-btn:disabled { background: #21262d; color: #555; cursor: default; }
    .badge { background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 2px 6px; color: #7cffb2; font-size: 0.7rem; margin-left: auto; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Terminal</span>
    <span id="platform-badge">detecting...</span>
    <span class="badge">NATIVE.os</span>
  </div>
  <div id="output">
    <div class="info">Type a command and press Enter or click Run.</div>
  </div>
  <div id="input-row">
    <span>$</span>
    <input id="cmd-input" placeholder="echo hello world" autofocus>
    <button id="run-btn" onclick="runCommand()">Run</button>
  </div>

  <script>
    const output = document.getElementById('output');
    const input = document.getElementById('cmd-input');
    const btn = document.getElementById('run-btn');
    let history = [];
    let histIdx = -1;

    function append(cls, text) {
      if (!text) return;
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    async function runCommand() {
      const raw = input.value.trim();
      if (!raw) return;
      history.unshift(raw);
      histIdx = -1;
      input.value = '';
      btn.disabled = true;

      append('cmd-line', raw);

      try {
        const parts = raw.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g) || [];
        const cmd = parts[0];
        const args = parts.slice(1).map(a => a.replace(/^["']|["']$/g, ''));
        const result = await window.NATIVE.os.exec(cmd, args);
        if (result.stdout) append('out-block', result.stdout);
        if (result.stderr) append('err-block', result.stderr);
        if (result.error && !result.stderr) append('err-block', result.error);
        if (!result.stdout && !result.stderr && !result.error) append('info', '(no output)');
      } catch (e) {
        append('err-block', String(e));
      }

      btn.disabled = false;
      input.focus();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { runCommand(); return; }
      if (e.key === 'ArrowUp') {
        if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
        e.preventDefault();
      }
      if (e.key === 'ArrowDown') {
        if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
        else { histIdx = -1; input.value = ''; }
        e.preventDefault();
      }
    });

    function init() {
      if (!window.NATIVE || !window.NATIVE.os) {
        setTimeout(init, 50);
        return;
      }
      window.NATIVE.os.platform().then(p => {
        document.getElementById('platform-badge').textContent = p;
      });
    }
    init();
  </script>
</body>
</html>
